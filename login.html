<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Polytechnic — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Poppins', 'Inter', sans-serif;
    background: #0B0F14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(130px);
    z-index: 0;
    pointer-events: none;
  }
  .orb-1 {
    width: 550px; height: 550px;
    background: radial-gradient(circle, rgba(126,211,33,0.35), transparent 70%);
    top: -150px; left: -150px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,183,3,0.25), transparent 70%);
    bottom: -180px; right: -150px;
    animation: drift2 22s ease-in-out infinite alternate;
  }
  .orb-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(126,211,33,0.12), transparent 70%);
    top: 50%; left: 55%;
    animation: drift3 15s ease-in-out infinite alternate;
  }
  @keyframes drift1 { 0%{transform:translate(0,0);} 100%{transform:translate(120px,100px);} }
  @keyframes drift2 { 0%{transform:translate(0,0);} 100%{transform:translate(-80px,-120px);} }
  @keyframes drift3 { 0%{transform:translate(0,0);} 100%{transform:translate(-60px,80px);} }

  /* Card */
  .login-card {
    position: relative;
    z-index: 10;
    background: rgba(14,14,14,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(126,211,33,0.08);
    animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(32px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Logo area */
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .p-icon-img {
    width: 120px;
    height: auto;
    object-fit: contain;
    margin-bottom: 24px;
    filter: drop-shadow(0 10px 20px rgba(0, 255, 136, 0.4));
    transition: transform 0.4s ease;
    border-radius: 50%; /* Background removal fix */
    background: #ffffff; /* Contrast fix */
    padding: 2px;
  }
  .p-icon-img:hover { transform: scale(1.05) rotate(2deg); }
  .login-logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    font-family: 'Poppins', sans-serif;
  }
  .login-logo h2 {
      font-size: 16px;
      color: var(--color-primary);
      margin-top: 4px;
      font-weight: 600;
  }
  .login-logo p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    font-weight: 400;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 0 0 28px;
  }

  /* Form */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
    font-size: 15px;
  }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-family: 'Outfit', sans-serif;
    padding: 13px 14px 13px 40px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }
  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: #7ed321;
    background: rgba(126,211,33,0.04);
    box-shadow: 0 0 0 3px rgba(126,211,33,0.12);
  }
  input::placeholder { color: rgba(255,255,255,0.22); }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    font-size: 13px;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 18px;
    text-align: center;
  }
  .error-msg.show { display: block; animation: shake 0.35s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  /* Login button */
  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7ed321, #5aa518);
    color: #000;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s;
    box-shadow: 0 6px 24px rgba(126,211,33,0.35);
    position: relative;
    overflow: hidden;
  }
  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(126,211,33,0.5);
  }
  .login-btn:active { transform: translateY(0); }
  .login-btn.loading { pointer-events: none; opacity: 0.8; }

  /* Hint */
  .hint {
    margin-top: 22px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    line-height: 1.7;
  }
  .hint b { color: rgba(255,255,255,0.55); font-weight: 500; }

  /* Footer */
  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.18);
  }
</style>
</head>
<body>

<!-- Background Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-card">

  <div class="login-logo">
    <img src="gp_logo.jpeg" alt="GP Panchkula Logo" class="p-icon-img">
    <h1>राजकीय पॉलिटेक्निक, सेक्टर 26, पंचकुला</h1>
    <h1 style="font-size:18px; opacity:0.8;">Government Polytechnic, Sector 26, Panchkula</h1>
    <p>Smart Parking Management System</p>
  </div>

  <hr class="divider">

  <div id="error-msg" class="error-msg">❌ Invalid email or password. Please try again.</div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Institute ID / Email</label>
      <div class="input-wrap">
        <span class="icon">✉</span>
        <input type="email" id="email" placeholder="e.g. admin@gppanchkula.ac.in" autocomplete="email" required>
      </div>
    </div>

    <div class="form-group">
      <label>Passkey</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Enter security password" autocomplete="current-password" required>
      </div>
    </div>

    <button type="submit" class="login-btn" id="login-btn">
      Sign In to Dashboard →
    </button>
  </form>

  <div class="hint">
    <b>Demo Credentials</b><br>
    admin@gppanchkula.ac.in &nbsp;/&nbsp; gp26park
  </div>

  <div class="login-footer">Government Polytechnic Panchkula, Haryana · Smart Campus v2.0</div>

</div>

<script>
  // If already logged in, skip to dashboard
  if (sessionStorage.getItem('pc_auth') === 'true') {
    window.location.href = 'index.html';
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('error-msg');

    btn.classList.add('loading');
    btn.textContent = 'Signing in...';
    err.classList.remove('show');

    // Simulate brief network delay for realism
    setTimeout(() => {
      if (email === 'admin@gppanchkula.ac.in' && pass === 'gp26park') {
        sessionStorage.setItem('pc_auth', 'true');
        sessionStorage.setItem('pc_user', email);
        btn.textContent = '✓ Success! Redirecting...';
        setTimeout(() => { window.location.href = 'index.html'; }, 600);
      } else {
        btn.classList.remove('loading');
        btn.textContent = 'Sign In to Dashboard →';
        err.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }, 700);
  }
</script>
</body>
</html>
